<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finding Eden</title>

  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>

  <style>
    img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<script>
(function () {

  const ROUTES = [
    "index.html",
    "about.html",
    "programs.html",
    "start-here.html",
    "tools.html",
    "resources.html",
    "voices.html",
    "event.html",
    "get-involved.html",
    "donate.html",
    "online-journal.html",
    "air-it-out.html"
  ];

  function fixLinks() {
    document.querySelectorAll("a[href]").forEach(link => {
      let href = link.getAttribute("href");

      if (!href) return;

      // 🔥 Remove ANY Replit or external routing
      href = href
        .replace(/https?:\/\/.*replit\.app/gi, "")
        .replace(/https?:\/\/.*replit\.dev/gi, "");

      // 🔥 Force clean .html navigation
      ROUTES.forEach(route => {
        const clean = route.replace(".html", "");
        if (href === "/" + clean || href === clean || href.includes(clean)) {
          href = "/" + route;
        }
      });

      link.setAttribute("href", href);
      link.removeAttribute("target"); // prevents weird behavior
    });
  }

  // 🔥 Kill any JS router interference
  window.addEventListener("click", function (e) {
    const link = e.target.closest("a");
    if (!link) return;

    const href = link.getAttribute("href");

    if (href && href.endsWith(".html")) {
      e.stopPropagation();
      e.preventDefault();
      window.location.href = href;
    }
  }, true);

  fixLinks();

  const observer = new MutationObserver(fixLinks);
  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>
<body> 
  <div id="root"></div>

<script>
(function () {

  function fixImages() {
    document.querySelectorAll("img").forEach(img => {
      const src = (img.getAttribute("src") || "").toLowerCase();
      const alt = (img.getAttribute("alt") || "").toLowerCase();

      // 🔥 DIRECT MATCHING TO YOUR FILES

      if (alt.includes("creative")) {
        img.src = "./creative-studio.jpeg";
      }

      else if (alt.includes("community healing") || alt.includes("circle")) {
        img.src = "./community-circle.jpeg";
      }

      else if (alt.includes("community")) {
        img.src = "./community.jpeg";
      }

      else if (alt.includes("walk")) {
        img.src = "./community-walk.jpeg";
      }

      else if (alt.includes("somatic")) {
        img.src = "./program-somatic.jpeg";
      }

      else if (alt.includes("regulation") || alt.includes("nervous")) {
        img.src = "./program-regulation.jpeg";
      }

      else if (alt.includes("circles")) {
        img.src = "./program-circles.jpeg";
      }

      else if (alt.includes("quiet")) {
        img.src = "./quiet-room.jpeg";
      }

      else if (alt.includes("rooftop")) {
        img.src = "./rooftop-circle.jpeg";
      }

      else if (alt.includes("desk") || alt.includes("welcome")) {
        img.src = "./welcome-desk.jpeg";
      }

      else if (alt.includes("yoga")) {
        img.src = "./yoga-room.jpeg";
      }

      else if (alt.includes("living")) {
        img.src = "./living-room.jpeg";
      }

      else if (alt.includes("event")) {
        img.src = "./launch-event.jpeg";
      }

      else if (alt.includes("exterior")) {
        img.src = "./exterior-building.jpeg";
      }

      else if (alt.includes("art")) {
        img.src = "./art.jpeg";
      }

      else if (alt.includes("founder")) {
        img.src = "./founder.jpeg";
      }
    });
  }

  function applyFixes() {
    fixImages();
  }

  applyFixes();

  const observer = new MutationObserver(applyFixes);
  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>

</body>
</html>
