<body>
  <div id="root"></div>

  <script>
    (function () {
      const ROUTE_MAP = {
        "/": "/",
        "/about": "/about",
        "/programs": "/programs",
        "/start-here": "/start-here",
        "/tools": "/tools",
        "/resources": "/resources",
        "/voices": "/voices",
        "/event": "/event",
        "/get-involved": "/get-involved",
        "/online-journal": "/online-journal",
        "/air-it-out": "/air-it-out",
      };

      function fixLinks(root = document) {
        root.querySelectorAll("a[href]").forEach((link) => {
          const href = link.getAttribute("href");
          if (!href) return;

          // Strip old Replit domain
          let cleaned = href
            .replace("https://deploy-ready--privatehealing.replit.app", "")
            .replace("http://deploy-ready--privatehealing.replit.app", "");

          // Force App label/link to Air It Out
          if (link.textContent && link.textContent.trim() === "App") {
            link.textContent = "Air It Out";
            cleaned = "/air-it-out";
          }

          if (ROUTE_MAP[cleaned]) {
            link.setAttribute("href", ROUTE_MAP[cleaned]);
          } else if (cleaned.startsWith("/") && !cleaned.startsWith("//")) {
            link.setAttribute("href", cleaned);
          }
        });
      }

      function fixEmails(root = document.body) {
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);

        nodes.forEach((node) => {
          if (node.nodeValue && node.nodeValue.includes("contact@findingeden.info")) {
            node.nodeValue = node.nodeValue.replaceAll(
              "contact@findingeden.info",
              "findingedenfoundation@gmail.com"
            );
          }
        });

        root.querySelectorAll('a[href^="mailto:contact@findingeden.info"]').forEach((a) => {
          a.setAttribute("href", "mailto:findingedenfoundation@gmail.com");
          if (a.textContent.includes("contact@findingeden.info")) {
            a.textContent = a.textContent.replaceAll(
              "contact@findingeden.info",
              "findingedenfoundation@gmail.com"
            );
          }
        });
      }
<script>
(function () {

  function lockImages() {
    document.querySelectorAll("img").forEach(img => {
      const alt = (img.alt || "").toLowerCase();

      // HERO / HOMEPAGE
      if (alt.includes("hero") || alt.includes("header")) {
        img.src = "/community-circle.jpeg";
      }

      // PROGRAMS PAGE
      if (alt.includes("somatic")) {
        img.src = "/program-somatic.jpeg";
      }

      if (alt.includes("regulation")) {
        img.src = "/program-regulation.jpeg";
      }

      if (alt.includes("circle")) {
        img.src = "/community-circle.jpeg";
      }

      if (alt.includes("story") || alt.includes("voice")) {
        img.src = "/group-circle.jpeg";
      }

      if (alt.includes("youth")) {
        img.src = "/community.jpeg";
      }

      if (alt.includes("art")) {
        img.src = "/creative-studio.jpeg";
      }

      // ABOUT PAGE
      if (alt.includes("founder")) {
        img.src = "/founder.jpeg";
      }

      if (alt.includes("space") || alt.includes("building")) {
        img.src = "/exterior-building.jpeg";
      }

      // START HERE / TOOLS
      if (alt.includes("tools") || alt.includes("grounding")) {
        img.src = "/living-room.jpeg";
      }

      if (alt.includes("walk")) {
        img.src = "/community-walk.jpeg";
      }

      // EVENT
      if (alt.includes("event")) {
        img.src = "/launch-event.jpeg";
      }

    });
  }

  // Run multiple times because React loads late
  setTimeout(lockImages, 500);
  setTimeout(lockImages, 1500);
  setTimeout(lockImages, 3000);

})();
