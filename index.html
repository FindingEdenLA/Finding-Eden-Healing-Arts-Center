<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Finding Eden</title>

  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="./index_files/css2" rel="stylesheet">

  <script type="module" src="./index_files/index-C8aWWcKi.js"></script>
  <link rel="stylesheet" href="./index_files/index-ox2lH1y1.css">

  <style>
    /* Founder image fix */
    img[src*="founder.jpeg"] {
      max-width: 320px;
      width: 100%;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>

<body>
  <div id="root"></div>

<script>
(function () {

  const ROUTE_MAP = {
    "/": "/",
    "/about": "/about",
    "/programs": "/programs",
    "/start-here": "/start-here",
    "/tools": "/tools",
    "/resources": "/resources",
    "/voices": "/voices",
    "/event": "/event",
    "/get-involved": "/get-involved",
    "/online-journal": "/online-journal",
    "/air-it-out": "/air-it-out",
  };

  // 🔥 MAP YOUR ORIGINAL FILE NAMES HERE
  const IMAGE_MAP = {
    "hero-space.jpeg": "image0.jpeg",
    "rooftop-circle.jpeg": "image1.jpeg",
    "welcome-space.jpeg": "image2.jpeg",
    "yoga-room.jpeg": "image3.jpeg",
    "welcome-desk.jpeg": "image4.jpeg",
    "exterior-building.jpeg": "image5.jpeg",
    "living-room.jpeg": "image6.jpeg",
    "community-walk.jpeg": "image7.jpeg",
    "art-therapy.jpeg": "image8.jpeg",
    "founder.jpeg": "image9.jpeg"
  };

  function fixImages() {
    document.querySelectorAll("img").forEach(img => {
      let src = img.getAttribute("src");
      if (!src) return;

      let fileName = src.split("/").pop();

      if (IMAGE_MAP[fileName]) {
        img.src = "./index_files/" + IMAGE_MAP[fileName];
      }
    });
  }

  function fixBackgroundImages() {
    document.querySelectorAll("*").forEach(el => {
      let bg = window.getComputedStyle(el).backgroundImage;

      if (!bg || !bg.includes(".jpeg")) return;

      Object.keys(IMAGE_MAP).forEach(original => {
        if (bg.includes(original)) {
          el.style.backgroundImage =
            "url('./index_files/" + IMAGE_MAP[original] + "')";
        }
      });
    });
  }

  function fixLinks(root = document) {
    root.querySelectorAll("a[href]").forEach((link) => {
      const href = link.getAttribute("href");
      if (!href) return;

      let cleaned = href
        .replace("https://deploy-ready--privatehealing.replit.app", "")
        .replace("http://deploy-ready--privatehealing.replit.app", "");

      if (link.textContent && link.textContent.trim() === "App") {
        link.textContent = "Air It Out";
        cleaned = "/air-it-out";
      }

      if (ROUTE_MAP[cleaned]) {
        link.setAttribute("href", ROUTE_MAP[cleaned]);
      } else if (cleaned.startsWith("/") && !cleaned.startsWith("//")) {
        link.setAttribute("href", cleaned);
      }
    });
  }

  function fixEmails(root = document.body) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach((node) => {
      if (node.nodeValue && node.nodeValue.includes("contact@findingeden.info")) {
        node.nodeValue = node.nodeValue.replaceAll(
          "contact@findingeden.info",
          "findingedenfoundation@gmail.com"
        );
      }
    });

    root.querySelectorAll('a[href^="mailto:contact@findingeden.info"]').forEach((a) => {
      a.setAttribute("href", "mailto:findingedenfoundation@gmail.com");
      a.textContent = "findingedenfoundation@gmail.com";
    });
  }

  function removeReplitPill() {
    document.querySelectorAll('script[src*="replit"]').forEach(el => el.remove());
    document.querySelectorAll("#replit-pill-host, #replit-badge").forEach(el => el.remove());
  }

  function applyFixes() {
    fixLinks(document);
    fixEmails(document.body);
    fixImages();
    fixBackgroundImages();
    removeReplitPill();
  }

  applyFixes();

  const observer = new MutationObserver(() => applyFixes());
  observer.observe(document.documentElement, { childList: true, subtree: true });

  window.addEventListener("load", applyFixes);
  setTimeout(applyFixes, 500);
  setTimeout(applyFixes, 1500);
  setTimeout(applyFixes, 3000);

})();
</script>

</body>
</html>
