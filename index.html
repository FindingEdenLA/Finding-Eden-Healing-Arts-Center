<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finding Eden</title>

  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>

  <script type="module" src="./index_files/index-C8aWWcKi.js"></script>
  <link rel="stylesheet" href="./index_files/index-ox2lH1y1.css">

  <style>
    img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      object-fit: cover;
      display: block;
    }

    /* Founder image */
    img[src*="founder.jpeg"] {
      max-width: 320px;
      margin: 20px auto;
    }
  </style>
</head>

<body>
  <div id="root"></div>

<script>
(function () {

  const IMAGE_MAP = {
    somatic: "/images/yoga.jpg",
    regulation: "/images/community-circle.jpg",
    circles: "/images/writing-circle.jpg",
    storytelling: "/images/writing-circle-2.jpg",
    voices: "/images/writing-circle-hero.jpg",
    youth: "/images/youth-program.jpg",
    art: "/images/art-room.jpg",
    event: "/images/rooftop-evening.jpg",
    community: "/images/community-main.jpg"
  };

  function lockImages() {
    document.querySelectorAll("img").forEach(img => {
      const alt = (img.getAttribute("alt") || "").toLowerCase();

      if (alt.includes("somatic")) img.src = IMAGE_MAP.somatic;
      else if (alt.includes("regulation") || alt.includes("nervous")) img.src = IMAGE_MAP.regulation;
      else if (alt.includes("circle")) img.src = IMAGE_MAP.circles;
      else if (alt.includes("story") || alt.includes("voice")) img.src = IMAGE_MAP.voices;
      else if (alt.includes("youth")) img.src = IMAGE_MAP.youth;
      else if (alt.includes("art")) img.src = IMAGE_MAP.art;
      else if (alt.includes("event")) img.src = IMAGE_MAP.event;
      else if (alt.includes("community")) img.src = IMAGE_MAP.community;
    });
  }

  function fixLinks(root = document) {
    root.querySelectorAll("a[href]").forEach((link) => {
      let href = link.getAttribute("href");
      if (!href) return;

      href = href
        .replace("https://deploy-ready--privatehealing.replit.app", "")
        .replace("http://deploy-ready--privatehealing.replit.app", "");

      if (link.textContent.trim() === "App") {
        link.textContent = "Air It Out";
        href = "/air-it-out";
      }

      link.setAttribute("href", href);
    });
  }

  function fixEmails(root = document.body) {
    root.innerHTML = root.innerHTML.replaceAll(
      "contact@findingeden.info",
      "findingedenfoundation@gmail.com"
    );
  }

  function removeReplit() {
    document.querySelectorAll('[src*="replit"]').forEach(el => el.remove());
  }

  function applyAll() {
    lockImages();
    fixLinks();
    fixEmails();
    removeReplit();
  }

  applyAll();

  const observer = new MutationObserver(applyAll);
  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>

</body>
</html>
</html>
